version: '3.8'

services:
  school-erp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-erp-platform
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    volumes:
      - ./logs:/app/logs
    networks:
      - school-erp-network

networks:
  school-erp-network:
    driver: bridge
